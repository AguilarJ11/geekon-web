name: Recordatorios de pago (Stand Comercial)

on:
  schedule:
    - cron: "0 12 * * *" # 12:00 UTC = 09:00 en Uruguay
  workflow_dispatch: {}

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar /api/cron/reminders
        run: |
          curl -sf -X POST "https://geekon-web-production.up.railway.app/api/cron/reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
